services:
  software-factory-postgres:
    image: postgres:16-alpine
    container_name: software-factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: software_factory
      POSTGRES_USER: software_factory
      POSTGRES_PASSWORD: software_factory
    ports:
      - "${SF_LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - software-factory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U software_factory -d software_factory"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  software-factory-postgres-data:
