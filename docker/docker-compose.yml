name: software-factory

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: software_factory
      POSTGRES_USER: software_factory
      POSTGRES_PASSWORD: software_factory
    ports:
      - "${SF_LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - software-factory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U software_factory -d software_factory"]
      interval: 5s
      timeout: 5s
      retries: 12

  softwarefactory-dashboard-backend:
    build:
      context: ..
      dockerfile: dashboard-backend/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "80"
      SF_GOOGLE_CLIENT_ID: ${SF_GOOGLE_CLIENT_ID:?set in secrets.env}
      SF_ALLOWED_EMAILS: ${SF_ALLOWED_EMAILS:-robbert@vdzon.com}
      SF_DASHBOARD_REMEMBER_SECRET: ${SF_DASHBOARD_REMEMBER_SECRET:?set in secrets.env}
      SF_DASHBOARD_REMEMBER_DAYS: ${SF_DASHBOARD_REMEMBER_DAYS:-30}
      SF_DASHBOARD_COOKIE_SECURE: ${SF_DASHBOARD_COOKIE_SECURE:-false}
      SF_BRIDGE_TOKEN: ${SF_BRIDGE_TOKEN:?set in secrets.env}
    ports:
      - "127.0.0.1:${SF_LOCAL_DASHBOARD_BACKEND_PORT:-9090}:80"
    depends_on:
      postgres:
        condition: service_healthy

  softwarefactory-dashboard-frontend:
    build:
      context: ../dashboard-frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ""
        BUILD_SHA: ${SF_DASHBOARD_BUILD_SHA:-local}
        BUILD_TIMESTAMP: ${SF_DASHBOARD_BUILD_TIMESTAMP:-local}
        GOOGLE_CLIENT_ID: ${SF_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SF_LOCAL_DASHBOARD_FRONTEND_PORT:-9080}:8080"
    depends_on:
      - softwarefactory-dashboard-backend

volumes:
  software-factory-postgres-data:
