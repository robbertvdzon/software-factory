name: Repository verification
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: repository-verification-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  releasebot-script:
    name: Releasebot integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and test image bump automation
        run: |
          bash -n .github/scripts/bump-images.sh
          bash .github/scripts/test-bump-images.sh

  agent-image-build-stage:
    name: Agent image build stage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shared mini-reactor and build agent stage
        run: |
          bash docker/test-prepare-mini-reactor.sh
          docker build --target build -f Dockerfile.agent .

  frontend-verification:
    name: Frontend verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          # 3.32.x bundelt een Dart-SDK ouder dan de ^3.9-eis van softwarefactory_dashboard;
          # 3.44.6 is de versie die pub zelf adviseerde toen de resolve faalde.
          flutter-version: '3.44.6'
          cache: true
      - name: Flutter analyse and test
        working-directory: dashboard-frontend
        run: |
          flutter pub get
          flutter analyze
          flutter test

  documentation-audit:
    name: Documentation audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository documentation facts
        run: tools/audit-documentation

  backend-verification:
    name: Backend verification
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Full Maven verification
        run: mvn --batch-mode --no-transfer-progress verify

  quality-ratchet:
    name: Kotlin quality ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compare all Kotlin main modules with the structural baseline
        run: ./quality/run.sh
      - name: Publish quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-ratchet
          path: qualityrun/

  repository-verification:
    name: Repository verification
    # Bewust NIET blokkerend op documentation-audit/quality-ratchet (needs hieronder mist ze
    # expres): allebei bleken herhaaldelijk merges te blokkeren op ruis die niets met de
    # story-inhoud te maken had (audit-tool-gat, of ratchet-drift uit ander werk dat toevallig
    # dezelfde functie raakte) — de agent-pipeline checkt zelf al inhoudelijk (mvn verify,
    # flutter test). Beide jobs blijven wél gewoon draaien en zichtbaar als losse PR-check, puur
    # informatief; drift daarin vangen we asynchroon op (nightly-job, nog te bouwen) i.p.v. de
    # merge te blokkeren.
    if: always()
    needs:
      - releasebot-script
      - agent-image-build-stage
      - frontend-verification
      - backend-verification
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed unless every component gate succeeded
        env:
          RELEASEBOT: ${{ needs.releasebot-script.result }}
          AGENT_IMAGE: ${{ needs.agent-image-build-stage.result }}
          FRONTEND: ${{ needs.frontend-verification.result }}
          BACKEND: ${{ needs.backend-verification.result }}
        run: |
          for result in "$RELEASEBOT" "$AGENT_IMAGE" "$FRONTEND" "$BACKEND"; do
            if [ "$result" != success ]; then
              echo "Repository verification blocked: component status is '$result'." >&2
              exit 1
            fi
          done
          echo "All repository verification component gates succeeded."
