# Persistent storage voor YouTrack — 4 aparte volumes conform JetBrains'
# self-host aanbeveling. Apart-houden maakt selectieve backup/restore
# eenvoudig: `data` is het meeste belangrijk (alle stories + Hub state),
# `conf` bevat de license + JVM-config (klein maar onmisbaar voor herstel),
# `logs` en `backups` zijn nice-to-have.
#
# storageClassName leeg → cluster-default = `local-path` (zie bootstrap.sh
# stap 5). Voor productie-cluster met meerdere nodes: switch naar een RWO
# CSI-driver met snapshot-support (gp3-csi op AWS, ceph-rbd on-prem).

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtrack-data
  namespace: youtrack
  labels:
    app: youtrack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # 20Gi is ruim voor personal use; YouTrack-data zelf groeit traag,
      # maar attachments (screenshots in tickets) tellen wel mee.
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtrack-conf
  namespace: youtrack
  labels:
    app: youtrack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Conf is klein (~MB's) — 1Gi geeft headroom voor JetBrains' eventuele
      # toekomstige bundled-files.
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtrack-logs
  namespace: youtrack
  labels:
    app: youtrack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # Log-rotation regelt YouTrack zelf; 5Gi houdt ~3 maanden historie.
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: youtrack-backups
  namespace: youtrack
  labels:
    app: youtrack
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # YouTrack's interne backup-jobs (in te plannen via UI) schrijven
      # hier naartoe. 10Gi voor ~10 incrementele backups.
      storage: 10Gi
