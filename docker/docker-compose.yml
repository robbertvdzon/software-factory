name: software-factory

services:
  postgres:
    image: postgres:17-alpine
    container_name: software-factory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: software_factory
      POSTGRES_USER: software_factory
      POSTGRES_PASSWORD: software_factory
    ports:
      - "${SF_LOCAL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - software-factory-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U software_factory -d software_factory"]
      interval: 5s
      timeout: 5s
      retries: 12

  youtrack:
    image: jetbrains/youtrack:2026.1.13570
    container_name: software-factory-youtrack
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SF_LOCAL_YOUTRACK_PORT:-9700}:8080"
    volumes:
      - software-factory-youtrack-data:/opt/youtrack/data
      - software-factory-youtrack-conf:/opt/youtrack/conf
      - software-factory-youtrack-logs:/opt/youtrack/logs
      - software-factory-youtrack-backups:/opt/youtrack/backups

  softwarefactory-dashboard-backend:
    build:
      context: ../dashboard-backend
      dockerfile: Dockerfile
    container_name: software-factory-dashboard-backend
    restart: unless-stopped
    env_file:
      - ../secrets.env
    environment:
      PORT: "80"
      SF_DATABASE_URL: postgresql://software_factory:software_factory@postgres:5432/software_factory
      SF_YOUTRACK_BASE_URL: http://youtrack:8080
    ports:
      - "127.0.0.1:${SF_LOCAL_DASHBOARD_BACKEND_PORT:-9090}:80"
    depends_on:
      postgres:
        condition: service_healthy
      youtrack:
        condition: service_started

  softwarefactory-dashboard-frontend:
    build:
      context: ../dashboard-frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ""
        BUILD_SHA: ${SF_DASHBOARD_BUILD_SHA:-local}
        BUILD_TIMESTAMP: ${SF_DASHBOARD_BUILD_TIMESTAMP:-local}
        GOOGLE_CLIENT_ID: ${SF_GOOGLE_CLIENT_ID:-}
    container_name: software-factory-dashboard-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${SF_LOCAL_DASHBOARD_FRONTEND_PORT:-9080}:8080"
    depends_on:
      - softwarefactory-dashboard-backend

volumes:
  software-factory-postgres-data:
  software-factory-youtrack-data:
  software-factory-youtrack-conf:
  software-factory-youtrack-logs:
  software-factory-youtrack-backups:
