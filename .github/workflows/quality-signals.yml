name: Quality signals
# Losgetrokken uit verify.yml (SF-1075-regressie, ontdekt 2026-07-18): deze twee jobs zijn bewust
# NIET blokkerend voor merges (zie de comment bij `repository-verification` in verify.yml), maar
# zolang ze in datzelfde workflow-bestand stonden, telde hun falen wél mee in de conclusion van de
# hele "Repository verification"-WORKFLOW-RUN — en dashboard-frontend-image.yml/
# dashboard-backend-image.yml triggeren via `workflow_run: conclusion == 'success'` op precies die
# run. Resultaat: zolang quality-ratchet rood stond, bouwde/deployde ELKE push naar main geen
# nieuwe dashboard-images meer, ook als de eigenlijke "Repository verification"-check (en dus de
# merge) allang groen was. SF-1075 werd hierdoor gemerged maar nooit live gezet.
# Aparte workflow = eigen run, eigen conclusion, kan structureel niets meer blokkeren.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: quality-signals-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  documentation-audit:
    name: Documentation audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository documentation facts
        run: tools/audit-documentation

  quality-ratchet:
    name: Kotlin quality ratchet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compare all Kotlin main modules with the structural baseline
        run: ./quality/run.sh
      - name: Publish quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-ratchet
          path: qualityrun/
