name: Build dashboard-backend image

on:
  workflow_run:
    workflows: [Repository verification]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  packages: write
  pull-requests: write
  statuses: write

concurrency:
  group: dashboard-backend-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/robbertvdzon/softwarefactory-dashboard-backend

jobs:
  build:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: dashboard-backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:main
          cache-from: type=gha,scope=softwarefactory-dashboard-backend
          cache-to: type=gha,mode=max,scope=softwarefactory-dashboard-backend

  bump-manifests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tag in deploy/base
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .github/scripts/bump-images.sh \
            dashboard-backend \
            "${{ github.event.workflow_run.id || github.run_id }}" \
            "${{ github.event.workflow_run.head_sha || github.sha }}" \
            deploy/base \
            "ci: bump dashboard-backend to ${{ needs.build.outputs.tag }}" \
            "ghcr.io/robbertvdzon/softwarefactory-dashboard-backend=ghcr.io/robbertvdzon/softwarefactory-dashboard-backend:${{ needs.build.outputs.tag }}"
