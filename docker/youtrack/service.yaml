# In-cluster service voor YouTrack. ClusterIP — externe toegang loopt
# via OpenShift Route (route.yaml) of via Cloudflare Tunnel met dit
# Service als upstream:
#
#   Cloudflare Zero Trust → Public hostname → Service:
#     http://youtrack.youtrack.svc.cluster.local:80
#
# Andere services in het cluster (toekomstige youtrack-poller) praten
# via dezelfde DNS-naam.

apiVersion: v1
kind: Service
metadata:
  name: youtrack
  namespace: youtrack
  labels:
    app: youtrack
spec:
  selector:
    app: youtrack
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
