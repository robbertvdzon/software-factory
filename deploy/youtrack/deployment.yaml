# YouTrack Server — single-replica JVM-app.
#
# Replica's: altijd 1. YouTrack is GEEN clusterable applicatie (één
# write-master, embedded XodusDB). Schalen = verticaal (meer RAM/CPU).
#
# OpenShift-compat:
#   * Image draait als UID 13001 ("youtrack"-user in de container).
#     Onder restricted-v2 (default-SCC op OpenShift) wordt elke UID
#     overschreven naar de namespace's allowed range, wat YouTrack's
#     bin/ scripts laat falen. bootstrap.sh grant daarom `anyuid` SCC
#     aan de default-SA in deze namespace.
#   * fsGroup matched de container-user zodat de mounted PVCs writable
#     zijn zonder init-container.
#
# Startup-tijd: 60-120s op koude start (Hub-init + Xodus-warmup).
# `startupProbe` met failureThreshold=60 × 5s = 5 min absolute upper
# bound voordat de pod als faalend wordt gezien.
#
# Eerste-gebruik flow (na succesvolle deploy):
#   1. Wizard-token ophalen:
#        oc logs -n youtrack deploy/youtrack | grep -i "wizard.*token"
#   2. Browser: https://<route-hostname>/?wizard_token=<TOKEN>
#   3. Base URL bevestigen, Application Listen Port op 8080 laten,
#      Free license aanvragen, admin-password zetten.
#   4. Inloggen met username `admin` + password (oudere YouTrack gebruikt
#      `root`, vanaf 2024.x is het `admin`).

apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtrack
  namespace: youtrack
  labels:
    app: youtrack
spec:
  replicas: 1
  strategy:
    # Recreate (niet rollingUpdate): YouTrack heeft één RWO-PVC voor data
    # en kan geen twee instances tegelijk de DB laten openen. Recreate
    # garandeert oude pod weg vóór nieuwe pod start.
    type: Recreate
  selector:
    matchLabels:
      app: youtrack
  template:
    metadata:
      labels:
        app: youtrack
    spec:
      securityContext:
        # JetBrains image's interne user. Volume-ownership moet daarmee
        # overeenkomen; fsGroup zorgt voor automatic chown bij mount.
        runAsUser: 13001
        runAsGroup: 13001
        fsGroup: 13001
        # Skipt de chown als de root-dir al de juiste GID heeft — bij
        # 20Gi-data-volumes zou full-tree-chown bij elke pod-start
        # tientallen seconden duren.
        fsGroupChangePolicy: OnRootMismatch
      # ── Init-container: volume-perms + SELinux-relabel ────────────────
      # local-path-provisioner maakt PV-dirs aan als root:root met
      # SELinux-label `container_var_lib_t`. UID 13001 mag daar niet in
      # schrijven (zelfs niet met chmod 0777 — SELinux denial).
      # Backend-pod werkt om dit heen via een ACL die OpenShift's MCS-range
      # erin zet, maar die ACL geldt alleen voor UIDs in de project-range.
      # YouTrack draait als hard-coded 13001 (buiten range) en heeft die
      # ACL niet — vandaar deze handmatige fix.
      #
      # Vereist `privileged` SCC granted aan de default-SA in `youtrack`
      # (zie bootstrap.sh stap 16). Eenmalig per pod-start (~1 sec); main-
      # container draait daarna unprivileged.
      initContainers:
        - name: fix-perms
          image: registry.access.redhat.com/ubi9-minimal:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            # Privileged + root nodig voor `chcon` op container_var_lib_t.
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            # Override de pod-level securityContext.runAsNonRoot.
            runAsNonRoot: false
          command:
            - sh
            - -c
            - |
              set -e
              for d in /vol-data /vol-conf /vol-logs /vol-backups; do
                echo "fixing $d ..."
                chown -R 13001:13001 "$d"
                chcon -R -t container_file_t "$d" 2>&1 || echo "(chcon op $d gaf warning — ok als label al klopt)"
              done

              # ── JVM-heap pinnen ───────────────────────────────────────
              # YouTrack negeert JAVA_OPTS/env-vars; de enige knop is
              # conf/youtrack.jvmoptions. Default-heap is te klein, waardoor
              # de Xodus-DB GC afbreekt met "risk of OutOfMemoryError".
              # We zetten -Xmx2g (past comfortabel onder de 4Gi cgroup-limit:
              # 2g heap + metaspace + off-heap/mmap + threads).
              #
              # Idempotent en zonder grep/sed (niet gegarandeerd in
              # ubi9-minimal): bestaande actieve -Xmx-regel vervangen,
              # commentaar-regels (# ...) met rust laten, anders toevoegen.
              # De launcher heeft een ingebouwde default-heap (-Xmx1024m);
              # die override je door een ACTIEVE youtrack.jvmoptions aan te
              # maken. De image levert alleen een volledig uitgecommentarieerde
              # template (.dist). Op een verse PVC seeden we daaruit (behoudt
              # alle defaults + commentaar) en patchen daarna de -Xmx-regel.
              # De launcher merge't onze opties met z'n base-flags, dus we
              # hoeven alleen -Xmx te zetten.
              JVMOPTS=/vol-conf/youtrack.jvmoptions
              DIST=/vol-conf/youtrack.jvmoptions.dist
              if [ ! -f "$JVMOPTS" ] && [ -f "$DIST" ]; then
                cp "$DIST" "$JVMOPTS"
                echo "jvmoptions: geseeded vanuit .dist (verse PVC)."
              fi
              if [ -f "$JVMOPTS" ]; then
                TMP="$JVMOPTS.tmp"
                found=0
                : > "$TMP"
                while IFS= read -r line || [ -n "$line" ]; do
                  case "$line" in
                    \#*)    printf '%s\n' "$line" >> "$TMP" ;;
                    *-Xmx*) printf '%s\n' "-Xmx2g" >> "$TMP"; found=1 ;;
                    *)      printf '%s\n' "$line" >> "$TMP" ;;
                  esac
                done < "$JVMOPTS"
                [ "$found" -eq 0 ] && printf '%s\n' "-Xmx2g" >> "$TMP"
                mv "$TMP" "$JVMOPTS"
                chown 13001:13001 "$JVMOPTS"
                chcon -t container_file_t "$JVMOPTS" 2>&1 || true
                echo "jvmoptions: -Xmx2g gezet."
              else
                # Geen actieve file én geen .dist — niets te doen (zou alleen
                # bij een kapotte image-layout kunnen). Launcher valt terug op
                # z'n eigen default-heap.
                echo "jvmoptions: geen file én geen .dist — overgeslagen."
              fi
              echo "init-container klaar."
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "64Mi"
          volumeMounts:
            - name: data
              mountPath: /vol-data
            - name: conf
              mountPath: /vol-conf
            - name: logs
              mountPath: /vol-logs
            - name: backups
              mountPath: /vol-backups
      containers:
        - name: youtrack
          image: jetbrains/youtrack:2026.1.13570
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: data
              mountPath: /opt/youtrack/data
            - name: conf
              mountPath: /opt/youtrack/conf
            - name: logs
              mountPath: /opt/youtrack/logs
            - name: backups
              mountPath: /opt/youtrack/backups
          resources:
            requests:
              # Heap is gepind op -Xmx2g (zie init-container). Request matcht
              # de heap zodat de scheduler die ruimte gegarandeerd reserveert;
              # zonder dat kan de pod op een te krappe node landen en alsnog
              # geheugendruk krijgen.
              cpu: "200m"
              memory: "2Gi"
            limits:
              # 2g heap + metaspace + off-heap/mmap (Xodus) + threads past
              # ruim onder 4Gi; geeft ook lucht voor activity-stream +
              # search-indexes. NB: YouTrack auto-tuned NIET op cgroup —
              # de heap komt expliciet uit youtrack.jvmoptions.
              cpu: "2"
              memory: "4Gi"
          # Probes — eerste 5 min vrijgehouden voor startup, daarna
          # readiness elke 10s en liveness elke 30s. We pingen "/" want
          # /api/config geeft 200 pas ná de wizard; / werkt vanaf moment
          # dat Jetty up is en de wizard-token afgegeven heeft.
          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 60
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: youtrack-data
        - name: conf
          persistentVolumeClaim:
            claimName: youtrack-conf
        - name: logs
          persistentVolumeClaim:
            claimName: youtrack-logs
        - name: backups
          persistentVolumeClaim:
            claimName: youtrack-backups
