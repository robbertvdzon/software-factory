name: Build dashboard-frontend image

on:
  push:
    branches: [main]
    paths:
      - 'dashboard-frontend/**'
      - '.github/workflows/dashboard-frontend-image.yml'
      - '.github/scripts/bump-images.sh'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  packages: write
  pull-requests: write

concurrency:
  group: dashboard-frontend-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/robbertvdzon/softwarefactory-dashboard-frontend
  FLUTTER_VERSION: '3.35.0'
  JDK_VERSION: '17'
  DASHBOARD_API_BASE_URL: https://dashboard.vdzonsoftware.nl

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build timestamp
        id: ts
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: dashboard-frontend
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ env.IMAGE }}:main
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.tag }}
            BUILD_TIMESTAMP=${{ steps.ts.outputs.ts }}
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
          cache-from: type=gha,scope=softwarefactory-dashboard-frontend
          cache-to: type=gha,mode=max,scope=softwarefactory-dashboard-frontend

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build timestamp
        id: ts
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Release-keystore klaarzetten
        working-directory: dashboard-frontend/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/sf-dashboard-release.keystore
          cat > keystore.properties <<EOF
          storeFile=sf-dashboard-release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEYSTORE_PASSWORD}
          EOF

      - name: Build APK
        working-directory: dashboard-frontend
        run: |
          set -euo pipefail
          flutter pub get
          flutter build apk --release \
            --build-number="${{ github.run_number }}" \
            --dart-define=API_BASE_URL="${{ env.DASHBOARD_API_BASE_URL }}" \
            --dart-define=BUILD_SHA="sha-${{ steps.sha.outputs.short }}" \
            --dart-define=BUILD_TIMESTAMP="${{ steps.ts.outputs.ts }}" \
            --dart-define=GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}"

      - name: Stage APK release assets
        id: stage
        run: |
          set -euo pipefail
          ts=$(date -u +"%Y%m%d-%H%M%S")
          sha="${{ steps.sha.outputs.short }}"
          filename="software-factory-dashboard-${ts}-${sha}.apk"
          tag="dashboard-apk-${ts}-${sha}"
          mkdir -p artifacts
          cp dashboard-frontend/build/app/outputs/flutter-apk/app-release.apk "artifacts/${filename}"
          cp dashboard-frontend/build/app/outputs/flutter-apk/app-release.apk artifacts/software-factory-dashboard.apk
          ls -la artifacts/
          echo "filename=${filename}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "ts=${ts}" >> "$GITHUB_OUTPUT"

      - name: GitHub Release met dashboard APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          name: "Software Factory Dashboard APK · ${{ steps.stage.outputs.ts }}"
          body: |
            Android release-APK voor het Software Factory dashboard.

            Dashboard API: `${{ env.DASHBOARD_API_BASE_URL }}`
            Build: `sha-${{ steps.sha.outputs.short }}`
            Build-time: `${{ steps.ts.outputs.ts }}`
          files: |
            artifacts/${{ steps.stage.outputs.filename }}
            artifacts/software-factory-dashboard.apk
          make_latest: true
          generate_release_notes: false

  bump-manifests:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tag in deploy/base
        run: |
          .github/scripts/bump-images.sh \
            dashboard-frontend \
            "${{ github.run_id }}" \
            "${{ github.sha }}" \
            deploy/base \
            "ci: bump dashboard-frontend to ${{ needs.build.outputs.tag }}" \
            "ghcr.io/robbertvdzon/softwarefactory-dashboard-frontend=ghcr.io/robbertvdzon/softwarefactory-dashboard-frontend:${{ needs.build.outputs.tag }}"
