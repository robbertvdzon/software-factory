<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="softwarefactory_dashboard">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon: zelfde "SF"-badge-SVG als het oude Kotlin-dashboard (HtmlLayout.kt) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%233f3d56'/%3E%3Ctext x='16' y='22' font-family='Arial,Helvetica,sans-serif' font-size='15' font-weight='bold' fill='%23ffffff' text-anchor='middle'%3ESF%3C/text%3E%3C/svg%3E">

  <title>Software Factory</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      function loadFlutter() {
        var script = document.createElement('script');
        script.src = 'flutter_bootstrap.js?v=' + Date.now();
        script.async = true;
        document.body.appendChild(script);
      }

      if (!('serviceWorker' in navigator)) {
        loadFlutter();
        return;
      }

      navigator.serviceWorker.getRegistrations()
        .then(function (registrations) {
          return Promise.all(registrations.map(function (registration) {
            return registration.unregister();
          }));
        })
        .then(function () {
          if (!('caches' in window)) {
            return Promise.resolve();
          }
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (key) {
              return caches.delete(key);
            }));
          });
        })
        .catch(function () {
          // Loading the app is more important than cache cleanup.
        })
        .finally(loadFlutter);
    })();
  </script>
</body>
</html>
