version: 1
commands:
  - id: repository-maven-verify
    # Alle JVM-modules uit pom.xml <modules> + de root-buildfiles zelf. Een wijziging puur onder
    # dashboard-frontend/ of docs/ raakt geen van deze paden en slaat dit (trage) commando dus
    # over — zie TesterVerificationRunner.isOutOfScope(). Bij twijfel/onbekende diff (geen
    # baseBranch, git-fout) draait dit gewoon altijd; alleen een aantoonbaar niet-overlappende
    # diff mag skippen.
    pathPrefixes:
      - factory-contracts/
      - factory-common/
      - softwarefactory/
      - agentworker/
      - dashboard-backend/
      - pom.xml
      - Dockerfile.agent
      - .factory/verification.yaml
    argv:
      - mvn
      - -B
      - --no-transfer-progress
      # `clean` is bewust: het story-workspace wordt door rollen gedeeld, en een eerder
      # afgebroken build kan corrupte restanten achterlaten (bv. een half geschreven
      # jacoco-exec die elke volgende verify laat falen op "Unknown block type").
      - clean
      - verify
    workingDirectory: .
    timeoutSeconds: 1800
  - id: dashboard-flutter-verify
    pathPrefixes:
      - dashboard-frontend/
    argv:
      - flutter
      - analyze
    workingDirectory: dashboard-frontend
    timeoutSeconds: 900
  - id: dashboard-flutter-pub-get
    pathPrefixes:
      - dashboard-frontend/
    argv:
      - flutter
      - pub
      - get
    workingDirectory: dashboard-frontend
    timeoutSeconds: 900
  - id: dashboard-flutter-test
    pathPrefixes:
      - dashboard-frontend/
    argv:
      - flutter
      - test
    workingDirectory: dashboard-frontend
    timeoutSeconds: 900
  - id: agent-image-build-stage
    # CI-only: de agent-container heeft geen docker-CLI (alleen de socket, voor Testcontainers),
    # dus dit commando kan de developer/tester nooit zelf draaien — het faalde altijd met
    # tool-missing, ongeacht de story. De echte GitHub Actions-job "Agent image build stage"
    # verifieert dit los en onafhankelijk, vóór de merge-gate.
    agentRunnable: false
    argv:
      - docker
      - build
      - --target
      - build
      - -f
      - Dockerfile.agent
      - .
    workingDirectory: .
    timeoutSeconds: 1800
  - id: agent-mini-reactor-smoke
    pathPrefixes:
      - docker/
      - pom.xml
    argv:
      - bash
      - docker/test-prepare-mini-reactor.sh
    workingDirectory: .
    timeoutSeconds: 300
  - id: repository-documentation-audit
    argv:
      - tools/audit-documentation
    workingDirectory: .
    timeoutSeconds: 120
